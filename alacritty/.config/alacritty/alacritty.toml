# Alacritty template (no colors block). apply-theme will append a single [colors] block.

[window]
dynamic_padding = true
decorations = "full"
opacity = 0.8

[font]
size = 12
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }

[scrolling]
history = 10000

[general]
live_config_reload = true

# Colors block is intentionally omitted here. apply-theme writes it.

[colors.primary]
background = "#151515"
foreground = "#e5e9ec"
[colors.normal]
black = "#151515"
red = "#909190"
green = "#AAA9A2"
yellow = "#C0BDB1"
blue = "#D0CAB4"
magenta = "#CFD2D2"
cyan = "#DADDDF"
white = "#e5e9ec"
[colors.bright]
black = "#a0a3a5"
red = "#909190"
green = "#AAA9A2"
yellow = "#C0BDB1"
blue = "#D0CAB4"
magenta = "#CFD2D2"
cyan = "#DADDDF"
white = "#e5e9ec"
