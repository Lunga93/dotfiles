# Alacritty template (no colors block). apply-theme will append a single [colors] block.

[window]
dynamic_padding = true
decorations = "full"
opacity = 0.8

[font]
size = 12
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }

[scrolling]
history = 10000

[general]
live_config_reload = true

# Colors block is intentionally omitted here. apply-theme writes it.

[colors.primary]
background = "#0a0c06"
foreground = "#e3a4c5"
[colors.normal]
black = "#0a0c06"
red = "#485133"
green = "#4A6436"
yellow = "#772D48"
blue = "#5B654B"
magenta = "#A82654"
cyan = "#A2205B"
white = "#e3a4c5"
[colors.bright]
black = "#9e7289"
red = "#485133"
green = "#4A6436"
yellow = "#772D48"
blue = "#5B654B"
magenta = "#A82654"
cyan = "#A2205B"
white = "#e3a4c5"
