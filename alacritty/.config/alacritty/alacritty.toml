# Alacritty template (no colors block). apply-theme will append a single [colors] block.

[window]
dynamic_padding = true
decorations = "full"
opacity = 0.8

[font]
size = 12
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }

[scrolling]
history = 10000

[general]
live_config_reload = true

# Colors block is intentionally omitted here. apply-theme writes it.

[colors.primary]
background = "#1d2122"
foreground = "#c0bdbf"
[colors.normal]
black = "#1d2122"
red = "#768767"
green = "#9F9462"
yellow = "#D4BD47"
blue = "#727487"
magenta = "#857C87"
cyan = "#7A8494"
white = "#c0bdbf"
[colors.bright]
black = "#868485"
red = "#768767"
green = "#9F9462"
yellow = "#D4BD47"
blue = "#727487"
magenta = "#857C87"
cyan = "#7A8494"
white = "#c0bdbf"
