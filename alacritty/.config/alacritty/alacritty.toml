# Alacritty template (no colors block). apply-theme will append a single [colors] block.

[window]
dynamic_padding = true
decorations = "full"
opacity = 0.8

[font]
size = 12
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }

[scrolling]
history = 10000

[general]
live_config_reload = true

# Colors block is intentionally omitted here. apply-theme writes it.

[colors.primary]
background = "#070C03"
foreground = "#acbdcd"
[colors.normal]
black = "#070C03"
red = "#628F1C"
green = "#6B9058"
yellow = "#949B2C"
blue = "#969763"
magenta = "#547395"
cyan = "#8B798B"
white = "#acbdcd"
[colors.bright]
black = "#78848f"
red = "#628F1C"
green = "#6B9058"
yellow = "#949B2C"
blue = "#969763"
magenta = "#547395"
cyan = "#8B798B"
white = "#acbdcd"
