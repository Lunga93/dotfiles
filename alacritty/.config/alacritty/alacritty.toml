# Alacritty template (no colors block). apply-theme will append a single [colors] block.

[window]
dynamic_padding = true
decorations = "full"
opacity = 0.8

[font]
size = 12
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }

[scrolling]
history = 10000

[general]
live_config_reload = true

# Colors block is intentionally omitted here. apply-theme writes it.

[colors.primary]
background = "#1d302e"
foreground = "#c8d0d6"
[colors.normal]
black = "#1d302e"
red = "#2199AB"
green = "#609DA6"
yellow = "#50ABB5"
blue = "#2BB1C3"
magenta = "#62B9C5"
cyan = "#73C3CB"
white = "#c8d0d6"
[colors.bright]
black = "#8c9195"
red = "#2199AB"
green = "#609DA6"
yellow = "#50ABB5"
blue = "#2BB1C3"
magenta = "#62B9C5"
cyan = "#73C3CB"
white = "#c8d0d6"
